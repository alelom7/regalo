<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorpresa per la Laurea!</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div id="landing-screen" class="screen">
        <header>
            <h1>Manca...</h1>
            <div id="countdown">Calcolo del tempo rimanente...</div>
            <button id="enter-btn">Entra nel sito ✨</button>
        </header>
    </div>

    <div id="main-screen" class="screen hidden">
        
        <div class="top-section">
            <div class="top-text">
                <h2>Dottoresse ad Alta Gradazione</h2>
                <p>Auguri dottoresseeeee</p>
            </div>
            <div class="photo-shadow-wrapper">
                <div class="top-photo"></div>
            </div>
        </div>

        <div class="bottom-section">
            <h3>ATTIVITÀ DISPONIBILI</h3>
            <p>Scegli il gioco o la galleria fotografica</p>
            
            <div class="button-grid">
                <button class="nav-btn" id="btn-galleria">📸 Galleria</button>
                <button class="nav-btn" id="btn-cruciverba">🧩 Cruciverba</button>
                <button class="nav-btn" id="btn-quiz">❓Altre cose</button>
                <button class="nav-btn" id="btn-bacheca">📝 Lascia una Dedica</button>
            </div>
        </div>
    </div>

    <div id="bacheca-screen" class="screen hidden">
        
        <div class="nav-bar">
            <button class="back-btn" id="back-from-bacheca">⬅ Torna al Menu</button>
            <h2>Bacheca Pubblica</h2>
        </div>

        <div class="iframe-container">
            <iframe src="https://padlet.com/lomastroalessandra7/dediche-per-le-festeggiate-o4omlr3lfxrtbkn5" frameborder="0" allow="camera;microphone;geolocation" style="width:100%; height:100%; border:none;"></iframe>
        </div>

    </div>

    <div id="cruciverba-screen" class="screen hidden">
        
        <div class="nav-bar">
            <button class="back-btn" id="back-from-cruciverba">⬅ Torna al Menu</button>
            <h2>Il Cruciverba</h2>
        </div>

        <div class="game-container">
            <p>1. L'elaborato finale che ti fa sudare freddo.</p>
            
            <div class="crossword-grid">
                <input type="text" class="cell" maxlength="1" data-answer="T">
                <input type="text" class="cell" maxlength="1" data-answer="E">
                <input type="text" class="cell" maxlength="1" data-answer="S">
                <input type="text" class="cell" maxlength="1" data-answer="I">
            </div>

            <button id="check-cruciverba" class="nav-btn">Controlla Soluzione</button>
            <p id="risultato-cruciverba"></p>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
